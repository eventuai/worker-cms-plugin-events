name = "worker-cms-plugin-events"
main = "src/index.ts"
compatibility_date = "2024-09-23"
compatibility_flags = ["nodejs_compat"]

# Admin view templates (LiquidJS + JSON templates, mirroring the CMS). The Worker
# runs first for every request and reads these internally via the VIEWS binding,
# so the files are never served publicly.
[assets]
directory = "./views"
binding = "VIEWS"
run_worker_first = true

[version_metadata]
binding = "CF_VERSION_METADATA"

# The CMS forwards this secret on every hook / admin / publish call, and this
# plugin sends it back on every Plugin API write-back call. Set it to THIS plugin's
# dedicated secret — shown in the CMS admin under Plugins → (this plugin) → Edit
# → Shared secret (each plugin has its own, so one can be rotated/revoked alone):
#   wrangler secret put PLUGIN_SECRET

[vars]
# Base URL of the CMS Worker — where this plugin reaches the Plugin API
# ({CMS_URL}/__cms/*, page read/write) to read events and create/update guest pages.
CMS_URL = "https://cms.eventuai.com"
# Public origin of the worker-rsvp site — signed RSVP links in queued EDMs point
# there (it verifies them with a copy of this plugin's PLUGIN_SECRET).
# PUBLIC_BASE_URL = "https://rsvp.eventuai.com"

# ── EDM email backbone (uncomment + provision before enabling delivery) ────────
# Cloudflare Email Service binding. EMAIL_FROM must be a verified sender address.
# [[send_email]]
# name = "EMAIL"

# [vars]
# EMAIL_FROM = "events@example.com"

# MJML render API (https://mjml.io/api). When set, EDM email HTML is compiled by
# MJML's hosted API (production-grade, Outlook-safe markup) instead of the
# built-in compiler. Get an Application ID + Secret Key from the MJML dashboard:
#   wrangler secret put MJML_APP_ID         # the Application ID
#   wrangler secret put MJML_SECRET_KEY     # the Secret Key
# Basic auth sends MJML_APP_ID:MJML_SECRET_KEY. Optional MJML_API_URL overrides
# the endpoint (default https://api.mjml.io/v1/render). Without these the plugin
# falls back to its built-in MJML compiler.

# Per-recipient send queue (decouples a blast from the request):
# [[queues.producers]]
# binding = "MAIL_QUEUE"
# queue = "cms-edm-mail"
# [[queues.consumers]]
# queue = "cms-edm-mail"

# Scheduled blasts — drain due mail_list rows on a cron tick:
# [triggers]
# crons = ["* * * * *"]

# Delivery tracking + MJML render cache. When bound alongside the MJML API
# secrets above, compiled email HTML is cached here (keyed by MJML hash) so
# repeated EDM previews/blasts of unchanged content don't spend MJML API quota:
# [[kv_namespaces]]
# binding = "MAIL_TRACKING"
# id = "<kv-id>"

# Attachments staging:
# [[r2_buckets]]
# binding = "ATTACHMENTS"
# bucket_name = "cms-edm-attachments"
