name = "worker-cms-plugin-events"
main = "src/index.ts"
compatibility_date = "2024-09-23"
compatibility_flags = ["nodejs_compat"]

# Admin view templates (LiquidJS + JSON templates, mirroring the CMS). The Worker
# runs first for every request and reads these internally via the VIEWS binding,
# so the files are never served publicly.
[assets]
directory = "./views"
binding = "VIEWS"
run_worker_first = true

[version_metadata]
binding = "CF_VERSION_METADATA"

# Bundle only the explicitly imported QR rasterizer fonts as ArrayBuffer data.
[[rules]]
type = "Data"
globs = ["**/*.woff2"]
fallthrough = true

# The CMS forwards this secret on every hook / admin / publish call, and this
# plugin sends it back on every Plugin API write-back call. Set it to THIS plugin's
# dedicated secret — shown in the CMS admin under Plugins → (this plugin) → Edit
# → Shared secret (each plugin has its own, so one can be rotated/revoked alone):
#   wrangler secret put PLUGIN_SECRET

# ── Multi-tenant mode (several CMS hosts → this one plugin) ────────────────────
# Bind a KV namespace and add one record per connected CMS; CMS_URL/PLUGIN_SECRET
# then become optional (they form a legacy fallback tenant if kept):
#   wrangler kv namespace create cms-plugin-events-tenants
#   wrangler kv key put --binding TENANTS "tenant:https://cms1.example.com" \
#     '{"secret":"<32-byte hex, unique per CMS>","signKey":"<32-byte hex>","publicBaseUrl":"https://rsvp1.example.com","vars":{"EMAIL_FROM":"events@cms1.example.com"}}'
# `secret` must match the CMS's Plugins → events → Shared secret. `signKey` signs
# public tokens (QR / RSVP / unsubscribe links) and is what you copy into that
# tenant's worker-rsvp + cms-plugin-checkin — never share the pairwise secret.
[[kv_namespaces]]
binding = "TENANTS"
id = "5511819de9f24bd596b25996e2b39eff"

[vars]
# Base URL of the CMS Worker — where this plugin reaches the Plugin API
# ({CMS_URL}/__cms/*, page read/write) to read events and create/update guest pages.
# In multi-tenant mode, per-tenant cmsUrl comes from the TENANTS record instead.
CMS_URL = "https://cms.eventuai.com"
# Public origin of the worker-rsvp site — signed RSVP links in queued EDMs point
# there (it verifies them with a copy of this plugin's PLUGIN_SECRET).
# PUBLIC_BASE_URL = "https://rsvp.eventuai.com"
# Public cms-plugin-checkin origin for guest /checkin/* QR links. Leave unset
# only for scanner-only raw-token QR codes.
# CHECKIN_BASE_URL = "https://checkin.eventuai.com"

# ── EDM email backbone (uncomment + provision before enabling delivery) ────────
# Pick ONE sending backend; EMAIL_FROM is the default sender either way (an
# EDM's own `sender` field overrides it per-EDM).
#
# Option A — Cloudflare Email Service binding. Only works when the sender
# domain's DNS is hosted ON Cloudflare (the service verifies it there):
# [[send_email]]
# name = "EMAIL"
#
# Option B — AWS SES v2 (any DNS host; the legacy eventuai identities carry
# over). When the three AWS_* values are set they take precedence over the
# EMAIL binding. Verify the sender domain/address in SES first:
#   wrangler secret put AWS_ACCESS_KEY_ID
#   wrangler secret put AWS_SECRET_ACCESS_KEY
# and in [vars]:
#   AWS_SES_REGION = "ap-southeast-1"
#   AWS_SES_CONFIGURATION_SET = "default"   # optional (bounce/open tracking)
# Multi-tenant: any of these may instead live in a TENANTS record's `vars` to
# give a tenant its own SES account/region/sender.

# [vars]
# EMAIL_FROM = "events@example.com"

# MJML render API (https://mjml.io/api). When set, EDM email HTML is compiled by
# MJML's hosted API (production-grade, Outlook-safe markup) instead of the
# built-in compiler. Get an Application ID + Secret Key from the MJML dashboard:
#   wrangler secret put MJML_APP_ID         # the Application ID
#   wrangler secret put MJML_SECRET_KEY     # the Secret Key
# Basic auth sends MJML_APP_ID:MJML_SECRET_KEY. Optional MJML_API_URL overrides
# the endpoint (default https://api.mjml.io/v1/render). Without these the plugin
# falls back to its built-in MJML compiler.

# Per-recipient send queue (decouples a blast from the request):
# [[queues.producers]]
# binding = "MAIL_QUEUE"
# queue = "cms-edm-mail"
# [[queues.consumers]]
# queue = "cms-edm-mail"

# Scheduled blasts — drain due mail_list rows on a cron tick:
# [triggers]
# crons = ["* * * * *"]

# Delivery tracking + MJML render cache. When bound alongside the MJML API
# secrets above, compiled email HTML is cached here (keyed by MJML hash) so
# repeated EDM previews/blasts of unchanged content don't spend MJML API quota:
# [[kv_namespaces]]
# binding = "MAIL_TRACKING"
# id = "<kv-id>"

# Attachments staging:
# [[r2_buckets]]
# binding = "ATTACHMENTS"
# bucket_name = "cms-edm-attachments"
